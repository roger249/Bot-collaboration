portfolio_review_task:

  agent: investment_advisor_agent

  description: |
    Generate a complete investment advice proposal using the provided reference materials.

    The reference materials are provided at the end of the user prompt as structured JSON with these sections:
    - clients: client profile and existing holdings
    - product_catalog: Contains file about the investable assets available for recommendation
    - The reference materials are provided at the end of the user prompt as structured JSON:
      - proposal_instruction_and_format: Instructions and format for generating the proposal
      - client_profiles: list of client profile and existing holdings
      - product_catalogs: investable assets available for recommendation
      - guidelines:  A list of the common needs.  Feel free to put up potential needs not in the list.
    - Observe the guideline ../shared/common/general_guideline.md

  expected_output: |
    A complete investment proposal in markdown format that:
    - The instruction and the sections in the proposal is in references/proposal_instructions/proposal_format.md.  Please strictly follow the format and the sections in the proposal instructions.
    - Use tables where they provide a clearer and more concise view.
    - Do not include any YAML blocks that are in the proposal_format.md, those are instructions to come up the section and shall NOT be included in the final output
