stock_analysis_proposal_task:

  agent: professional_stock_investor_agent

  description: |
    - The stock ticker to analysis is in proposal_instructions/stock_ticker.md
    - Follow the proposal_instructions/proposal_format.md under the reference section to come up the proposal.  This includes the following tasks
      - Gather the data required for the analysis including below preferably from YFinance, or websites and the news_and_data provided in the reference materials.  
        - the historical price ratio 
        - Recent news and outlook about the company
        - Recent market outlook on the sector and the overall market
      - Please limit your use of the tools to 15 invocations to minimize run-time.
    - Always use non-adjusted stock price for the analysis and proposal.
    - The reference materials are provided at the end of the user prompt as structured JSON that includes below:
      - proposal_instruction_and_format: Instructions and format for generating the proposal
      - news_and_data: A collection of news and data relevant to the analysis and proposal.  
    - Please ensure the stock name is same as the one in the stock_ticker.md
    - Some preferred websites are listed in news_and_data/preferred_websites.md. 
    - The domain in the file news_and_data/blocked_domains.md should not be accessed.
    - All analysis and figure presented in the reporting currency.  No FX conversion is needed.
  
  expected_output: |

    A report in markdown format.
    - The instruction and the proposal format is in proposal_instructions/proposal_format.md.  Follow the section requirement and examples in the markdown.
    - Use tables where they provide a clearer and more concise view.
    - All figures in the table shall be right aligned.
    - Try to use point form when its appropriate.
    - All output begins exactly with the line: "---** Output of suggestion as below **---"
    - Do not include YAML blocks, or commentary.
