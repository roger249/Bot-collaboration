client_investment_proposal_task:

  agent: investment_advisor_agent

  description: |

    - Given a client profile and one suggested product, generate an client product-fit proposal for the client that includes a product-fit score and justification for the recommendation.
    - Format and instruction to come up the proposal are provided in references/proposal_format.md.  Please strictly follow the format and instruction (in yaml block) to generate the proposal.
    - The reference materials are provided at the end of the user prompt as structured JSON with these sections:
      - clients_profiles: The client profile and existing holdings, and suggested product
      - product_catalogs: Details of the investable assets available for recommendation
      - references: 
        - common_needs:  A list of the common needs.  Feel free to put up potential needs not in the list.
  
  expected_output: |

    A client product-fit report in markdown format that:
    - Begins exactly with the line: "---** Output of suggestion as below **---"
    - Put up a title and brief summary of the overall recommendation.
    - Use tables where they provide a clearer and more concise view.
    - Do not include YAML blocks, extra sections, or commentary.
    - Put up a references section at the end that cites specific reference documents used to support the recommendations, with links to the source documents, including any local files sent.
