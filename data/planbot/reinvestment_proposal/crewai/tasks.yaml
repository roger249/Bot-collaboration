reinvestment_proposal_task:

  agent: investment_advisor_agent

  description: |

    - Given a client profile and the expected inflow amount, suggest one product for the reinvestment in the client portfolio.
      - includes a product-fit score and justification for the recommendation.
    - Do not increase holding for any product other than the suggested product.
    - The suggested product shall have similar risk level as the maturing product.
    - The reference materials are provided at the end of the user prompt as a structured JSON:
      - client_profiles: list of client profile and existing holdings
      - product_catalogs: investable assets available for recommendation
      - guidelines:  A list of the common needs.  Feel free to put up potential needs not in the list.
      - proposal_instruction_and_format: Instructions and format for generating the proposal
    - Observe the guideline shared/common/general_guideline.md when producing the proposal.
  
  expected_output: |

    A reinvestment analysis in markdown format.
    - The instruction and the proposal format is in proposal_instructions/proposal_format.md.  Follow the section requirement and examples in the markdown.
    - Use tables where they provide a clearer and more concise view.
    - Do not include YAML blocks, extra section, or commentary.
