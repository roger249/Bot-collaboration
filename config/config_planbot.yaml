  poe_deepseek_tool:
    provider: poe
    # model: deepseek-v4-pro-t # emit the stupid thinking, couldn't use
    # model: minimax-m2.7-fw # emit the stupid thinking, couldn't use
    model: qwen3-235b-a22b-n
    temperature: 0.2
  poe_qwen:
    provider: poe
    model: qwen3.5-397b-a17b-t
    # model: qwen3.6-plus
    temperature: 0.1
  poe_deepseek:
    provider: poe
    model: deepseek-v3.2-exp
    # model: deepseek-v3.2-fw
    # model: deepseek-v4-pro-t # emit the stupid thinking, couldn't use
    temperature: 0.2
