# Configuration for PlanBot, a bot designed for portfolio review and client suitability analysis in the financial domain.

common:
# Below are default folder locations to use unless it's specified in the individual proposal section.  In such case, the
# setting in the proposla section will override the common setting
  crewai_config_folder: config/crewai/planbot

product_investor_matching:
  task: product_investor_matching_task
  data_root: data/planbot/product_investor_matching
  crewai_config_folder: data/planbot/product_investor_matching/crewai
  references_root: data/planbot/product_investor_matching
  output_root: runs/product_investor_matching
  output_filename: product_investor_matching.md
  references:
    proposal_instructions_and_format:
      - name: proposal_instructions/*.md
        purpose: Instructions and format for generating the proposal
      - name: ../shared/proposal_section_instructions/*.md
        purpose: Detail instructions for specific sections in the proposal
    guidelines: 
      - name: ../shared/financial_needs/*.md
        purpose: Guidelines on financial needs analysis and common financial needs
      - name: ../shared/common/general_guideline.md
        purpose: Strict guidelines on all tasks.  No exception allowed
    client_profiles:
      - name: clients/*.md
        purpose: Client profiles and suggested product for each client in markdown format
      - name: clients/*.csv
        purpose: Client profiles and suggested product for each client in csv format
    product_catalogs: 
      - name: ../shared/product_catalog/*.md
        purpose: Overview of the CSV file and the structure of the product catalogs
      - name: ../shared/product_catalog/*.csv
        purpose: Details of the investable assets available for recommendation in csv format
  llm_model: poe_deepseek

client_product_fit_analysis:
  task: client_product_fit_analysis_task
  output_root: runs/client_product_fit_analysis
  output_filename: client_product_fit_analysis.md
  overwrite_output_folder: true
  crewai_config_folder: data/planbot/client_product_fit/crewai
  references_root: data/planbot/client_product_fit
  references:
    proposal_instructions_and_format:
      - name: proposal_instruction/*.md
        purpose: Instructions and format for generating the proposal
      - name: ../shared/proposal_section_instructions/*.md
        purpose: Detail instructions for specific sections in the proposal
    guidelines: 
      - name: ../shared/financial_needs/*.md
        purpose: Guidelines on financial needs analysis and common financial needs
      - name: ../shared/common/general_guideline.md
        purpose: Strict guidelines on all tasks.  No exception allowed
    client_profiles:
      - name: clients/*.md
        purpose: Client profiles and suggested product for each client in markdown format
      - name: clients/*.csv
        purpose: Client profiles and suggested product for each client in csv format
    product_catalogs: 
      - name: ../shared/product_catalog/*.md
        purpose: Overview of the CSV file and the structure of the product catalogs
      - name: ../shared/product_catalog/*.csv
        purpose: Details of the investable assets available for recommendation in csv format
  llm_model: poe_deepseek

portfolio_review:
  task: portfolio_review_task
  data_root: data/planbot/portfolio_review
  crewai_config_folder: data/planbot/portfolio_review/crewai
  references_root: data/planbot/portfolio_review
  output_root: runs/portfolio_review
  output_filename: portfolio_review.md
  references:
    proposal_instructions_and_format:
      - name: proposal_instructions/*.md
        purpose: Instructions and format for generating the proposal
      - name: ../shared/proposal_section_instructions/*.md
        purpose: Detail instructions for specific sections in the proposal
    guidelines: 
      - name: ../shared/financial_needs/*.md
        purpose: Guidelines on financial needs analysis and common financial needs
      - name: ../shared/common/general_guideline.md
        purpose: Strict guidelines on all tasks.  No exception allowed
    client_profiles:
      - name: clients/*.md
        purpose: Client profiles and suggested product for each client in markdown format
      - name: clients/*.csv
        purpose: Client profiles and suggested product for each client in csv format
    product_catalogs: 
      - name: ../shared/product_catalog/*.md
        purpose: Overview of the CSV file and the structure of the product catalogs
      - name: ../shared/product_catalog/*.csv
        purpose: Details of the investable assets available for recommendation in csv format
  llm_model: poe_deepseek

llm_models:
  poe_qwen:
    provider: poe
    model: qwen3.6-plus
    temperature: 0.1
  poe_deepseek:
    provider: poe
    model: deepseek-v3.2-fw
    temperature: 0.2
  poe_free:
    provider: poe
    model: gemma-4-31b
    temperature: 0.1
  poe_phi:
    provider: poe
    model: phi-4-di
    temperature: 0.1   
  or_gemma:
    provider: openrouter
    model: google/gemma-4-31b-it:free
    temperature: 0.1
  # model: google/gemma-4-31b-it:free
  # model: qwen/qwen3-next-80b-a3b-instruct:free
  mock:
    provider: mock
    model: mock
