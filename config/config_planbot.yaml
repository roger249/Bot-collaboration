# Configuration for PlanBot, a bot designed for portfolio review and client suitability analysis in the financial domain.

common:
# Below are default folder locations to use unless it's specified in the individual proposal section.  In such case, the
# setting in the proposal section will override the common setting
  crewai_config_folder: config/crewai/planbot
  cleanup_temp_files: false # If true, temporary files generated during processing will be deleted after use.  If false, they will be kept for debugging.
  data_service_url: http://localhost:8001/api/v1  # URL of the data service (Phase B: HTTP resolver calls this for client/product data)
  get_client_product_from_db: false # When true, client_profiles and product_catalogs are fetched via API instead of file globs.
  # HTTP resolver settings (Phase B) — used when get_client_product_from_db is true
  # and the resolver makes HTTP calls to the FastAPI server.
  http_resolver:
    timeout_seconds: 30
    max_retries: 3
    retry_backoff_factor: 0.5  # exponential backoff multiplier

# Server bind settings — consumed by data_server and proposal_server __main__ blocks.
# Not used by the monolithic server.py (kept for backward compatibility).
server:
  data:
    host: "127.0.0.1"
    port: 8001
  proposal:
    host: "127.0.0.1"
    port: 8000

stock_analysis_proposal:
  task: stock_analysis_proposal_task
  data_root: data/planbot/stock_analysis
  crewai_config_folder: data/planbot/stock_analysis/crewai
  references_root: data/planbot/stock_analysis
  output_root: runs/stock_analysis
  output_filename: stock_analysis_proposal.md
  references:
    proposal_instructions_and_format:
      - name: proposal_instructions/*.md
        purpose: Instructions and format for generating the proposal
    news_and_data:
      - name: news_and_data/**/*.md
        purpose: Recent news and data for the stock analysis
  llm_model: poe_gemini 
  # deepseek_tool (deepseek-v4-flash) ignores CrewAI ReAct stop-sequences and returns Final Answer immediately

reinvestment_proposal:
  task: reinvestment_proposal_task
  data_root: data/planbot/reinvestment_proposal
  crewai_config_folder: data/planbot/reinvestment_proposal/crewai
  references_root: data/planbot/reinvestment_proposal
  output_root: runs/reinvestment_proposal
  output_filename: reinvestment_proposal.md
  references:
    proposal_instructions_and_format:
      - name: proposal_instructions/*.md
        purpose: Instructions and format for generating the proposal
      - name: ../shared/proposal_section_instructions/*.md
        purpose: Detail instructions for specific sections in the proposal
    guidelines: 
      - name: ../shared/financial_needs/*.md
        purpose: Guidelines on financial needs analysis and common financial needs
      - name: ../shared/common/general_guideline.md
        purpose: Strict guidelines on all tasks.  No exception allowed
      - name: ../shared/market_outlook/*.md
        purpose: Market outlook and sentiment analysis for the recommendation
    # client_profiles and product_catalogs will be retrieved via API when invoked in production
    # The following files are used in prototype and kept as backward compatibility, will deprecated.
    client_profiles:
      - name: clients/*.md
        purpose: Client profiles and suggested product for each client in markdown format
      - name: clients/*.csv
        purpose: Client profiles and suggested product for each client in csv format
    product_catalogs: 
      - name: ../shared/product_catalog/*.md
        purpose: Selected products to consider for reinvestment recommendation in markdown format
      - name: ../shared/product_catalog/*.csv
        purpose: Full list of the investable assets available for recommendation in csv format
      - name: ../shared/product_catalog/*.json
        purpose: Full product details including type_specific attributes in JSON format
  llm_model: deepseek_tool

