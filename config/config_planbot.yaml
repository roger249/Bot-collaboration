# Configuration for PlanBot, a bot designed for portfolio review and client suitability analysis in the financial domain.

common:
# Below are default folder locations to use unless it's specified in the individual proposal section.  In such case, the
# setting in the proposla section will override the common setting
  shared_no_web_note_file: data/shared/no_external_web_note.md
  crewai_config_folder: config/crewai/planbot

portfolio_review:
  task: portfolio_review_task
  output_root: runs/portfolio_review
  data_root: data/planbot/portfolio_review/data
  crewai_config_folder: crewai
  output_filename: portfolio_review.md
  reference_glob: references/*.md
  client_glob: clients/*.md
  product_catalog_glob: product_catalog/*.md
  overwrite_output_folder: true
  provider: poe
#  model: deepseek-v3.2-exp
#  model: qwen3.6-plus
  model: qwen3.5-flash
#  model: gemma-4-31b-t
#  model: glm-5.1-t
#  model: kimi-k2.5-fw
#  model: minimax-m2
#  model: gpt-oss-120b
#  model: gpt-5.2
  temperature: 0.2
  web_access: true

client_suitability:
  task: client_suitability_task
  output_root: runs/client_suitability
  data_root: data/planbot/client_suitability/data
  crewai_config_folder: crewai
  output_filename: client_suitability.md
  reference_glob: references/*.md
  client_glob: 
    - clients/*.md
    - clients/*.csv
  product_catalog_glob: 
    - product_catalog/*.md
    - product_catalog/*.csv
  overwrite_output_folder: true
  provider: poe
#  model: deepseek-v3.2-exp
  model: qwen3.6-plus
#  model: qwen3.5-flash
#  model: gemini-3-flash
#  model: kimi-k2.5-fw
#  model: minimax-m2
  temperature: 0.2
  web_access: true

product_investor_matching:
  task: product_investor_matching_task
  output_root: runs/product_investor_matching
  data_root: data/planbot/product_investor_matching/data
  crewai_config_folder: crewai
  output_filename: product_investor_matching.md
  reference_glob: references/*.md
  client_glob: 
    - clients/*.md
    - clients/*.csv
  product_catalog_glob: 
    - product_catalog/*.md
    - product_catalog/*.csv
  overwrite_output_folder: true
  provider: poe
#  model: deepseek-v3.2-exp
#  model: qwen3.6-plus
  model: qwen3.5-flash
  temperature: 0.2
  web_access: true
