# Configuration for PlanBot, a bot designed for portfolio review and client suitability analysis in the financial domain.

common:
# Below are default folder locations to use unless it's specified in the individual proposal section.  In such case, the
# setting in the proposla section will override the common setting
  crewai_config_folder: config/crewai/planbot

portfolio_review:
  task: portfolio_review_task
  output_root: runs/portfolio_review
  data_root: data/planbot/portfolio_review/data
  crewai_config_folder: crewai
  output_filename: portfolio_review.md
  reference_glob: 
    - references/*.md
    - ../shared/proposal_section_instructions/*.md
    - ../shared/financial_needs/*.md
  client_glob: clients/*.md
  product_catalog_glob: 
    - ../shared/product_catalog/*.md
    - ../shared/product_catalog/*.csv
  overwrite_output_folder: true
  llm_model: poe_deepseek
  web_access: true

client_investment_proposal:
  crewai_config_folder: crewai
  task: client_investment_proposal_task
  output_root: runs/client_investment_proposal
  output_filename: client_investment_proposal.md
  overwrite_output_folder: true
  data_root: data/planbot/client_investment_proposal/data
  # references section in the reference materials provides the instruction on how to generate the proposal.  The agent should strictly follow the instruction to generate the proposal.
  reference_glob: 
    - references/*.md
    - ../shared/proposal_section_instructions/*.md
    - ../shared/financial_needs/*.md
  # client_profiles section in the reference materials provides the client profile and suggested product for each client.  The agent should use the information to generate the proposal.
  client_glob: 
    - clients/*.md
    - clients/*.csv
  # product_catalogs section in the reference materials provides the details of the investable assets available for recommendation.  The agent should use the information to generate the proposal.
  product_catalog_glob: 
    - ../shared/product_catalog/*.md
    - ../shared/product_catalog/*.csv
  llm_model: poe_deepseek
  web_access: true

product_investor_matching:
  task: product_investor_matching_task
  output_root: runs/product_investor_matching
  data_root: data/planbot/product_investor_matching/data
  crewai_config_folder: crewai
  output_filename: product_investor_matching.md
  reference_glob: 
    - references/*.md
    - ../shared/proposal_section_instructions/*.md
    - ../shared/financial_needs/*.md
  client_glob: 
    - clients/*.md
    - clients/*.csv
  product_catalog_glob: 
    - ../shared/product_catalog/*.md
    - ../shared/product_catalog/*.csv
  overwrite_output_folder: true
  llm_model: poe_deepseek
  web_access: true

llm_models:
  poe_qwen:
    provider: poe
    model: qwen3.6-plus
    temperature: 0.1
  poe_deepseek:
    provider: poe
    model: deepseek-v3.2-fw
    temperature: 0.2
  poe_free:
    provider: poe
    model: gemma-4-31b
    temperature: 0.1
  poe_phi:
    provider: poe
    model: phi-4-di
    temperature: 0.1   
  or_gemma:
    provider: openrouter
    model: google/gemma-4-31b-it:free
    temperature: 0.1
  # model: google/gemma-4-31b-it:free
  # model: qwen/qwen3-next-80b-a3b-instruct:free
  mock:
    provider: mock
    model: mock
