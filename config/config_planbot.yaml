    provider: poe
    model: gemini-3.1-flash-lite
    temperature: 0.1
  poe_free:
    provider: poe
    model: gemma-4-31b
    temperature: 0.1
  poe_phi:
    provider: poe
    model: phi-4-di
    temperature: 0.1   
  or_gemma:
    provider: openrouter
    model: google/gemma-4-31b-it:free
    temperature: 0.1
  # model: google/gemma-4-31b-it:free
  # model: qwen/qwen3-next-80b-a3b-instruct:free
  mock:
    provider: mock
    model: mock

investor_readiness_score:
  output:
    file: runs/investor_readiness_score/scores.csv
    duckdb: data/planbot/db/planbot.duckdb
  score_cash_drag:
    weight: 1
    pivot:
      0.0: 0
      0.2: 3
      0.5: 9
      1.0: 10
  score_concentration_risk:
    weight: 1
    s_single_holding:
      0.2: 0
      1.0: 10
    s_region_exposure:
      0.4: 0
      1.0: 10
    s_asset_class_exposure:
      0.6: 0
      1.0: 10
  score_active_manage:
    weight: 1
    has_fund: 3
  score_life_stage:
    weight: 1
    pivot:
      25: 0
      35: 5
      45: 10
      65: 10
      80: 5

product_fitness_score:
# Product fitness score configuration — weights, sigmas, and parameters for
# search_similar, search_reinvestment_candidates, and search_product_by_fitness_score.
# All score constants are defined here; the implementation must not hard-code them.
  search_similar_weights:
    risk_rating: 0.25
    expected_return: 0.20
    product_type: 0.15       # soft-scored only — never a hard filter
    asset_class: 0.10
    region: 0.10
    sector: 0.05
    time_to_maturity: 0.10
    coupon: 0.05
  search_similar_sigmas:
# Per-dimension scale for numeric similarity: s_i = 1 - min(|x - q| / sigma, 1).
# If omitted, sigma_i falls back to population std dev from the products table.
    risk_rating: 2.0
    expected_return: 5.0
    time_to_maturity: 730.0   # days (~2 years)
    coupon: 2.0
  product_fitness_weights:
# Weights for the 4 PFS dimensions.  Renormalized when dimensions are excluded.
    risk_rating_match_score: 0.30
    concentration_score: 0.30
    has_similar_investment_experience_score: 0.20
    better_product_score: 0.20
  product_fitness_params:
    better_product_score_scale: 10
    better_product_score_uplift_cap: 0.30
    better_product_score_eps: 0.01
    concentration_test_position_pct_aum: 0.10  # % of AUM used as hypothetical test position
    experience_score_same_type: 10.0            # high: same product_type held
    experience_score_same_family: 6.0           # medium: same product_family held
    experience_score_none: 0.0                  # low: no match

run_configurations:
  schema_version: 1
  # Pydantic model is built with the following defaults.
  defaults:
    transport: in_memory
    retry_count: 0
    continue_on_client_error: true
    overwrite_output_file: true
    max_parallel_clients: 1
    keep_generated_client_inputs: true

  client_product_fit_analysis_proposals:
    # Generate one client_product_fit_analysis per selected client
    # Contract: 'from' defines iteration count and order; alias values must resolve one value per iteration; every placeholder token used downstream must be defined in alias.
    generated_inputs_root: runs/client_product_fit_analysis/generated_inputs
    fan_out:
      from: product_investor_matching_filter.output.client_profiles
      alias: 
        client_id: product_investor_matching_filter.output.client_ids
      references_section_binding:
        # below will go into the path specified in client_profiles section in the corresponding report.
        - product_investor_matching_filter.output.client_profiles.{client_id}.md
        - client_holdings_filter.output.by_client_id.{client_id}.md
      execute:
        - proposal: client_product_fit_analysis
          enabled: true
          output_file: runs/sample_outputs/client_product_fit_analysis_{client_id}.md
        # Keep this as optional while validating first integrated flow.
        - proposal: portfolio_review
          enabled: true
          output_file: runs/sample_outputs/portfolio_review_{client_id}.md

  filters:
    product_investor_matching_filter:
      input:
        proposal: product_investor_matching
        execute_proposal_first: false
      output:
        # This will extract each section with header match the following regex for use in future input. The content extracted just for one section and will not include the next section (next ## is encountered).
        # the size of client_ids should be the same as the number of sections extracted in client_profiles.  Each client_id will be matched with one section in client_profiles based on the order of appearance.
        # Internally this is stored as a map with client_id as the key.
        client_profiles:
          mode: split_sections_by_header
#          header_pattern: "^#{2,}\\s*(?:.*Client\\s*ID|Rank\\s*\\d+\\s*[–-]\\s*Client\\s+[^\\s(]+)"
          header_pattern: "^##[^C]*Client"
        client_ids:
          mode: regex_capture_all
          pattern: "(?:Client[^\\d]*\\s+)([^\\s]+)"
#          pattern: "(?:Client\\s*ID:?\\s*|Rank\\s*\\d+\\s*[–-]\\s*Client\\s+)([^\\s(]+)"
          ## Rank 1: Client ID 1 (James Harrison)


    # This filter accepts the input and generate holdings for each client id
    client_holdings_filter:
      input:
        file: data/planbot/shared/client_profile/client_list.csv
        client_ids: product_investor_matching_filter.output.client_ids
      output:
        by_client_id: map

    # This filter enriches client data with demographic profiles from client_profile.csv
    # (birthdate, occupation, risk rating, marital status, etc.)
    client_profile_filter:
      input:
        file: data/planbot/shared/client_profile/client_profile.csv
        holdings_file: data/planbot/shared/client_profile/client_list.csv
        client_ids: product_investor_matching_filter.output.client_ids
      output:
        by_client_id: map
