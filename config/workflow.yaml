workflow:
  name: pb_author_reviewer_phase1
  spec_file: data/PB system spec.v1.md
  guideline_file: config/prompts/guideline_to_spec.md
  output_root: runs
  max_rounds: 1
  stop_on_no_blockers: true

logging:
  level: INFO
  config_file: config/logging_config.ini

runtime:
  default_timeout_seconds: 120

bots:
  author:
    provider: poe
#    model: qwen3.5-plus
    model: claude-sonnet-4.6
#    model: deepseek-v3.1
    prompt_file: config/prompts/author_prompt.md
    temperature: 0.2
  reviewer:
    provider: poe
    model: gemini-3-flash
#    model: claude-sonnet-4.6
    prompt_file: config/prompts/reviewer_prompt.md
    temperature: 0.1

providers:
  openai_compatible:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    timeout_seconds: 120
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    timeout_seconds: 120
  poe:
    api_key_env: POE_API_KEY
    base_url: https://api.poe.com/v1
    timeout_seconds: 1000
