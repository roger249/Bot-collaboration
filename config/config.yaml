# Global configuration for the bot collaboration framework

logging:
  level: INFO
  api_debug_level: INFO
  config_file: config/logging_config.ini
  chat_history_enabled: true
  chat_history_max_bytes: 5000000
  chat_history_backup_count: 5
  chat_history_body_max_chars: 20000
  chat_history_redact_fields:
    - authorization
    - api_key
  crewai_verbose: true

llm_models:
  poe_qwen:
    provider: poe
    model: qwen3.5-397b-a17b-t
    # model: qwen3.6-plus
    temperature: 0.1
  poe_deepseek:
    provider: poe
    model: deepseek-v3.2-exp
    # model: deepseek-v3.2-fw
    # model: deepseek-v4-pro-t # emit the stupid thinking, couldn't use
    temperature: 0.2
  poe_free:
    provider: poe
    model: gemma-4-31b
    temperature: 0.1
  poe_phi:
    provider: poe
    model: phi-4-di
    temperature: 0.1   
  or_gemma:
    provider: openrouter
    model: google/gemma-4-31b-it:free
    temperature: 0.1
  # model: google/gemma-4-31b-it:free
  # model: qwen/qwen3-next-80b-a3b-instruct:free
  mock:
    provider: mock
    model: mock

providers:
  openrouter:
    api_key_env: OPENROUTER_API_KEY
    base_url: https://openrouter.ai/api/v1
    timeout_seconds: 240
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    timeout_seconds: 1800
  poe:
    api_key_env: POE_API_KEY
    base_url: https://api.poe.com/v1
    timeout_seconds: 300

# Below are configuration specific to the author-reviewer workflow. 

workflow:
  name: author_reviewer
  spec_file: data/author_reviewer/PB system spec.orig.md
  guideline_file: config/prompts/author_reviewer/system_prompt.md
  output_root: runs
  overwrite_output_folder: true
  max_rounds: 2
  stop_on_no_blockers: true

runtime:
  default_timeout_seconds: 120

bots:
  author:
    provider: poe
#    model: deepseek-v3.1
#    model: qwen3.5-plus
    model: qwen3.5-flash
#    model: claude-sonnet-4.5
    prompt_file: config/prompts/author_reviewer/author_prompt.md
    temperature: 0.2
  reviewer:
    provider: poe
#    model: claude-sonnet-4.5
#    model: deepseek-v3.1
    model: qwen3.5-flash
    prompt_file: config/prompts/author_reviewer/reviewer_prompt.md
    temperature: 0.1

