workflow:
  name: author_reviewer
  spec_file: data/author_reviewer/PB system spec.v1.md
  guideline_file: config/prompts/author_reviewer/system_prompt.md
  output_root: runs
  overwrite_output_folder: true
  max_rounds: 1
  stop_on_no_blockers: true

logging:
  level: INFO
  config_file: config/logging_config.ini
  chat_history_enabled: true
  chat_history_max_bytes: 5000000
  chat_history_backup_count: 5
  chat_history_body_max_chars: 20000
  chat_history_redact_fields:
    - authorization
    - api_key

runtime:
  default_timeout_seconds: 120

bots:
  author:
    provider: poe
#    model: deepseek-v3.1
#    model: qwen3.5-plus
    model: qwen3.5-flash
#    model: claude-sonnet-4.5
    prompt_file: config/prompts/author_reviewer/author_prompt.md
    temperature: 0.2
  reviewer:
    provider: poe
#    model: gpt-5.2
#    model: claude-sonnet-4.5
#    model: deepseek-v3.1
    model: qwen3.5-flash
    prompt_file: config/prompts/author_reviewer/reviewer_prompt.md
    temperature: 0.1

providers:
  openai_compatible:
    api_key_env: OPENAI_API_KEY
    base_url: https://api.openai.com/v1
    timeout_seconds: 120
  deepseek:
    api_key_env: DEEPSEEK_API_KEY
    base_url: https://api.deepseek.com
    timeout_seconds: 120
  poe:
    api_key_env: POE_API_KEY
    base_url: https://api.poe.com/v1
    timeout_seconds: 900

planbot:
  name: planbot
  output_root: runs/planbot
  output_filename: output.md
  reference_glob: data/planbot/reference/*.md
  system_prompt_file: config/prompts/planbot/system_prompt.md
  prompt_file: config/prompts/planbot/investment_prompt.md
  shared_no_web_note_file: config/prompts/shared/no_external_web_note.md
  overwrite_output_folder: true
  provider: poe
  model: deepseek-v3.2-exp
  temperature: 0.2
  web_access: true
