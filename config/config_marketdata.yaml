# The rating is assigned by running thru the following table from top the bottom, for example, if the downside deviation is 15%, it will run thru the row until the number on the right hand side is more than 15%.  The same logic applies to all other rating tables
risk_rating:
  - 1: 1%
  - 2: 4%
  - 3: 10%
  - 4: 20%
  - 5: 

# 30%, 50%, 70%, 85%, 95%
certainty_rating:
  - 1: 30%
  - 2: 50%
  - 3: 70%
  - 4: 85%
  - 5: 95%

certainty_period:
- 1y
- 3y
- 8y

# Certainty computation:
#   certainty_enabled: false skips generating certainty columns entirely.
#   Formula: z = √T · (r − μ) / σ, where r = certainty_target_return (fixed target %, e.g. 0 = break-even).
#   The z-score is rated via the certainty_rating table (top-to-bottom first-match).
certainty_enabled: false
certainty_target_return: 0

# Liquidity rating based on asset type / quote type from Yahoo Finance.
# Keys are matched case-insensitively against quoteType and asset_class fields.
# Falls back to volume-based estimation if no mapping matches.
liquidity_rating:
  etf: 5
  equity: 5
  currency: 5
  future: 5
  index: 5
  mutualfund: 4
  bond: 4
  structured: 3
  annuity: 3
  realestate: 2
  privateequity: 1