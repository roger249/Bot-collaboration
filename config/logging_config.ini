# Logging configuration for the bot collaboration framework

[loggers]
keys=root, chat_history

[handlers]
keys=consoleHandler,fileHandler,chatHistoryFileHandler

[formatters]
keys=defaultFormatter,consoleFormatter

[logger_root]
level=%(log_level)s
handlers=consoleHandler,fileHandler

[logger_chat_history]
level=DEBUG
handlers=chatHistoryFileHandler
qualname=chat_history
propagate=0

[handler_consoleHandler]
class=StreamHandler
level=%(log_level)s
formatter=consoleFormatter
args=(sys.stdout,)

[handler_fileHandler]
class=FileHandler
level=%(log_level)s
formatter=defaultFormatter
args=('%(log_file)s', 'a', 'utf-8')

[handler_chatHistoryFileHandler]
class=FileHandler
level=DEBUG
formatter=defaultFormatter
args=('%(chat_history_log_file)s', 'a', 'utf-8')

[formatter_defaultFormatter]
format=%(asctime)s %(levelname)s %(name)s %(message)s
datefmt=%Y-%m-%d %H:%M:%S

[formatter_consoleFormatter]
format=%(asctime)s %(levelname)s %(name)s %(message)s
datefmt=%H:%M:%S
